<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-label="Joy Inc. — Little objects. Big joy.">
  <!-- Sunburst mark -->
  <g transform="translate(320 70)">
    <circle r="18" fill="#F4C95D"/>
    <g stroke="#D97A7A" stroke-width="2.6" stroke-linecap="round">
      <line x1="0" y1="-38" x2="0" y2="-28"/>
      <line x1="0" y1="38" x2="0" y2="28"/>
      <line x1="-38" y1="0" x2="-28" y2="0"/>
      <line x1="38" y1="0" x2="28" y2="0"/>
      <line x1="-27" y1="-27" x2="-20" y2="-20"/>
      <line x1="27" y1="27" x2="20" y2="20"/>
      <line x1="-27" y1="27" x2="-20" y2="20"/>
      <line x1="27" y1="-27" x2="20" y2="-20"/>
    </g>
  </g>

  <!-- JOY wordmark -->
  <text x="320" y="210"
        text-anchor="middle"
        font-family="'Fraunces', 'Playfair Display', Georgia, serif"
        font-size="108" font-weight="600" font-style="italic"
        fill="#3D2E24" letter-spacing="2">
    Joy
  </text>

  <!-- Inc. -->
  <text x="320" y="252"
        text-anchor="middle"
        font-family="'Fraunces', 'Playfair Display', Georgia, serif"
        font-size="28" font-weight="400" font-style="italic"
        fill="#8A7D72" letter-spacing="8">
    Inc.
  </text>

  <!-- Tagline -->
  <text x="320" y="298"
        text-anchor="middle"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="500" letter-spacing="5"
        fill="#D97A7A">
    LITTLE OBJECTS &#8226; BIG JOY
  </text>
</svg>
