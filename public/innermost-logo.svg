<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1000" width="600" height="1000" role="img" aria-label="Innermost — The next best step starts within.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0D0A"/>
      <stop offset="50%" stop-color="#1A1510"/>
      <stop offset="100%" stop-color="#12100C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#D4A04A" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#D4A04A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#D4A04A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="1000" fill="url(#bg)"/>
  <rect width="600" height="1000" fill="url(#glow)"/>

  <!-- Concentric circles mark -->
  <g transform="translate(300 370)">
    <circle r="150" fill="none" stroke="#D4A04A" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle r="108" fill="none" stroke="#D4A04A" stroke-opacity="0.32" stroke-width="1.5"/>
    <circle r="66" fill="none" stroke="#D4A04A" stroke-opacity="0.55" stroke-width="1.5"/>
    <circle r="28" fill="#D4A04A"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="640" text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="600" font-size="88"
        fill="#F4EFE6" letter-spacing="-1">
    Innermost
  </text>

  <!-- Tagline -->
  <text x="300" y="700" text-anchor="middle"
        font-family="'DM Sans', Helvetica, Arial, sans-serif"
        font-size="20" fill="#D4A04A" letter-spacing="3" font-weight="500">
    THE NEXT BEST STEP
  </text>
  <text x="300" y="730" text-anchor="middle"
        font-family="'DM Sans', Helvetica, Arial, sans-serif"
        font-size="20" fill="#D4A04A" letter-spacing="3" font-weight="500">
    STARTS WITHIN
  </text>

  <!-- Under-tagline -->
  <text x="300" y="790" text-anchor="middle"
        font-family="'DM Sans', Helvetica, Arial, sans-serif"
        font-size="15" fill="#ffffff" fill-opacity="0.45" letter-spacing="1">
    Orientation, not motivation.
  </text>
  <text x="300" y="813" text-anchor="middle"
        font-family="'DM Sans', Helvetica, Arial, sans-serif"
        font-size="15" fill="#ffffff" fill-opacity="0.45" letter-spacing="1">
    Triage over transcendence.
  </text>

  <!-- Framework strip (vertical) -->
  <g font-family="'DM Sans', Helvetica, Arial, sans-serif" font-size="12" fill="#ffffff" fill-opacity="0.35" letter-spacing="3">
    <text x="300" y="900" text-anchor="middle">ASSESS &#8594; STABILIZE</text>
    <text x="300" y="922" text-anchor="middle">ORIENT &#8594; ACTIVATE</text>
  </g>

  <!-- Byline -->
  <text x="300" y="970" text-anchor="middle"
        font-family="'DM Sans', Helvetica, Arial, sans-serif"
        font-size="10" fill="#ffffff" fill-opacity="0.22" letter-spacing="2">
    BY OLDMAN AI SOLUTIONS
  </text>
</svg>
