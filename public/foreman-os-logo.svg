<!-- PLACEHOLDER: swap this file with the real Foreman OS logo when available.
     Same filename so no code changes are needed at swap time. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Foreman OS">
  <defs>
    <linearGradient id="fmbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1420"/>
      <stop offset="100%" stop-color="#1B2940"/>
    </linearGradient>
    <linearGradient id="fmaccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A7BBF"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#fmbg)"/>

  <!-- Grid pattern suggesting infrastructure / on-site systems -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="0" y1="175" x2="1200" y2="175"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="300" y1="0" x2="300" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="900" y1="0" x2="900" y2="700"/>
  </g>

  <!-- Central building / server-rack silhouette -->
  <g transform="translate(600 280)">
    <rect x="-80" y="-70" width="160" height="140" rx="6"
          fill="none" stroke="#C4A265" stroke-width="2"/>
    <line x1="-80" y1="-35" x2="80" y2="-35" stroke="#C4A265" stroke-width="1" opacity="0.6"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#C4A265" stroke-width="1" opacity="0.6"/>
    <line x1="-80" y1="35" x2="80" y2="35" stroke="#C4A265" stroke-width="1" opacity="0.6"/>
    <circle cx="60" cy="-50" r="3" fill="#3A7BBF"/>
    <circle cx="60" cy="-15" r="3" fill="#3A7BBF"/>
    <circle cx="60" cy="20" r="3" fill="#C4A265"/>
    <circle cx="60" cy="55" r="3" fill="#3A7BBF"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="440" text-anchor="middle"
        font-family="'DM Serif Display', Georgia, serif"
        font-size="72" font-weight="400" fill="#F4EFE6" letter-spacing="2">
    Foreman OS
  </text>

  <!-- Accent rule -->
  <rect x="540" y="470" width="120" height="2" fill="url(#fmaccent)"/>

  <!-- Tagline -->
  <text x="600" y="520" text-anchor="middle"
        font-family="'Inter', sans-serif"
        font-size="22" font-weight="500" fill="#C4A265" letter-spacing="4">
    YOUR AI. YOUR BUILDING. YOUR DATA.
  </text>

  <!-- Capability chips -->
  <g font-family="'Inter', sans-serif" font-size="12" font-weight="500"
     letter-spacing="2" fill="#B0BEC5">
    <text x="600" y="590" text-anchor="middle">
      ON-SITE &#8226; PROPRIETARY &#8226; SOVEREIGN DATA &#8226; OWNED INFRASTRUCTURE
    </text>
  </g>

  <!-- Byline -->
  <text x="600" y="655" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="11"
        fill="rgba(255,255,255,0.35)" letter-spacing="2">
    BY OLDMAN AI SOLUTIONS &#8226; PLACEHOLDER &#8212; REAL LOGO PENDING
  </text>
</svg>
