<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="The Craft">
  <!-- Top hairline with center break for mark -->
  <line x1="60" y1="50" x2="290" y2="50" stroke="#B88A4E" stroke-width="1"/>
  <line x1="350" y1="50" x2="580" y2="50" stroke="#B88A4E" stroke-width="1"/>

  <!-- THE (right-aligned to approach center) -->
  <text x="280" y="116"
        text-anchor="end"
        font-family="'Fraunces', 'Playfair Display', Georgia, serif"
        font-size="54"
        font-weight="600"
        letter-spacing="10"
        fill="#E8E4DB">THE</text>

  <!-- Diamond-point mark (center) -->
  <g transform="translate(320, 100)">
    <polygon points="0,-15 13,0 0,15 -13,0" fill="#B88A4E"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#0E0E0E" stroke-width="1.25"/>
  </g>

  <!-- CRAFT (left-aligned from center) -->
  <text x="360" y="116"
        text-anchor="start"
        font-family="'Fraunces', 'Playfair Display', Georgia, serif"
        font-size="54"
        font-weight="600"
        letter-spacing="10"
        fill="#E8E4DB">CRAFT</text>

  <!-- Bottom hairline -->
  <line x1="60" y1="150" x2="580" y2="150" stroke="#B88A4E" stroke-width="1"/>

  <!-- Supporting line -->
  <text x="320" y="178"
        text-anchor="middle"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="5"
        fill="#8A867D">BY OLDMAN AI SOLUTIONS</text>
</svg>
